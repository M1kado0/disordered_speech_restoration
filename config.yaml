seed: 42

dataset:
  name: m1kado/UASpeech-Whisper
  split_strategy: official
  train_split: train
  validation_split: validation
  test_split: test
  audio_column: audio
  text_column: text
  speaker_column: speaker_id
  target_sampling_rate: 16000

model:
  base_id: openai/whisper-medium
  language: en
  task: transcribe
  max_label_length: 64
  torch_dtype: float16
  attn_implementation: sdpa

training:
  output_dir: outputs/lora_whisper_medium
  per_device_train_batch_size: 12
  per_device_eval_batch_size: 12
  gradient_accumulation_steps: 1
  learning_rate: 0.0001
  warmup_steps: 100
  num_train_epochs: 3
  weight_decay: 0.01
  evaluation_strategy: steps
  eval_steps: 500
  save_steps: 500
  logging_steps: 50
  fp16: true
  gradient_checkpointing: false
  max_train_steps: null
  dataloader_num_workers: 8
  dataloader_pin_memory: true

lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - v_proj

evaluation:
  metrics:
    - wer
    - cer
    - pesq
    - stoi
  prediction_output: outputs/predictions
