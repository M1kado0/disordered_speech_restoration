seed: 42

dataset:
  name: m1kado/UASpeech-Whisper
  split_strategy: official
  train_split: train
  test_split: test
  audio_column: audio
  text_column: transcript
  speaker_column: speaker_id
  target_sampling_rate: 16000

model:
  base_id: openai/whisper-medium
  language: en
  task: transcribe
  max_label_length: 256

training:
  output_dir: outputs/lora_whisper_medium
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 0.0001
  warmup_steps: 100
  num_train_epochs: 3
  weight_decay: 0.01
  evaluation_strategy: steps
  eval_steps: 500
  save_steps: 500
  logging_steps: 50
  fp16: true
  gradient_checkpointing: true
  max_train_steps: null

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - out_proj

evaluation:
  metrics:
    - wer
    - cer
    - pesq
    - stoi
  prediction_output: outputs/predictions
